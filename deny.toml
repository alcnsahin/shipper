# cargo-deny configuration — run in CI via EmbarkStudios/cargo-deny-action.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[licenses]
version = 2
# Allow licenses compatible with the project's distribution model.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "0BSD",
    "CC0-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[advisories]
version = 2
yanked = "deny"
ignore = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
